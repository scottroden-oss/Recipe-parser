<!DOCTYPE html>
<html>
<head>
    <title>Recipe Simplifier</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%; }
        h1 { color: #333; margin-bottom: 20px; }
        form { margin-top: 20px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; }
        input[type="url"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        input[type="submit"] { margin-top: 20px; padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        input[type="submit"]:hover { background: #45a049; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍳 Recipe Simplifier</h1>
        <p>Enter a recipe URL to extract ingredients, instructions, and scale for any number of servings! 📋</p>
        <form method="post" action="/parse">
            <label for="url">🔗 Recipe URL:</label>
            <input type="url" name="url" size="80" required placeholder="https://example.com/recipe">
            <input type="submit" value="🚀 Fetch and Simplify">
        </form>
    </div>
</body>
</html>
